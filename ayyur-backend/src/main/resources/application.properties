# ─── Serveur ───────────────────────────────────────────────
server.port=8080

# ─── Base de données MySQL ─────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ayyur_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=ayyur_user
spring.datasource.password=AyyurSecret2024!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
# "update" : crée/met à jour les tables automatiquement au démarrage
# Mettre "validate" en production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ──────────────────────────────────────────────────
# Changez cette clé secrète en production (min 256 bits)
app.jwt.secret=AyyurJwtSecretKey2024VeryLongSecretKeyForSecurity
app.jwt.expiration=86400000

# ─── CORS (autorise votre frontend React) ─────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://atelierayyur.com

# ─── Admin par défaut ────────────────────────────────────
# Ces valeurs sont utilisées pour créer l'admin au 1er démarrage
app.admin.username=admin
app.admin.password=AyyurAdmin2024!

# ─── Fichiers uploadés (photos produits) ─────────────────
app.upload.dir=uploads/products
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
